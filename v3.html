<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Shangshang Wang</title>
  <meta name="description" content="Shangshang Wang — living by research (Shangshang), by seeing (Ashton), and by living (Upup)." />
  <link rel="icon" type="image/png" href="assets/avatar.png" />

  <!-- Social preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Shangshang Wang" />
  <meta property="og:description" content="Living by Research, by Seeing, by Living." />
  <meta property="og:url" content="https://shangshang-wang.github.io/" />
  <meta property="og:image" content="https://shangshang-wang.github.io/assets/avatar.png" />
  <meta name="twitter:card" content="summary" />

  <!-- Font: Zen Kaku Gothic New — a crisp, modern Japanese gothic -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --paper: #efe7d6;   /* kinari — Japanese raw-silk sand */
      --ink:   #1a1a1a;
      --link:  #55534c;
      --who:   #2a2a28;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      background: var(--paper);
      color: var(--ink);
      font-family: "Zen Kaku Gothic New", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* small note pinned to the top-left corner */
    .corner {
      position: absolute;
      top:  calc(clamp(1rem, 4vw, 1.6rem) + env(safe-area-inset-top, 0px));
      left: calc(clamp(1rem, 4vw, 1.6rem) + env(safe-area-inset-left, 0px));
      max-width: 64vw;
      font-size: clamp(0.72rem, 2.3vw, 0.85rem);
      letter-spacing: 0.01em;
      line-height: 1.4;
      font-weight: 500;
      color: #6d6a61;
    }

    /* ---------- Hero ---------- */
    main {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(1.5rem, 5vw, 3rem);
    }

    /* The shape triad — now monochrome, each transforming within its own family */
    .emblem {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 4.2vw, 30px);
      margin-bottom: clamp(1.6rem, 5vw, 2.7rem);
    }
    .shp { width: clamp(28px, 6.4vw, 42px); height: clamp(28px, 6.4vw, 42px); display: block; }

    /* entrance (outer) */
    .ein { display: inline-block; opacity: 0; animation: ein .7s cubic-bezier(.2,.7,.3,1) forwards; }
    @keyframes ein { from { opacity: 0; transform: translateY(14px) scale(.7); } to { opacity: 1; transform: none; } }

    /* solid shapes — the triangle flips and the square turns (hole cut-outs removed) */
    .spin-c { transform-origin: center; animation: spinC 7s ease-in-out infinite; }
    .spin-t { transform-origin: center; animation: spinT 9s ease-in-out infinite -3s; }
    .spin-s { transform-origin: center; animation: spinS 8s ease-in-out infinite -2s; }

    @keyframes spinC { 0%,100% { transform: rotate(0); } 50% { transform: rotate(180deg); } }
    @keyframes spinT { 0%,100% { transform: rotate(0); } 50% { transform: rotate(180deg); } }
    @keyframes spinS { 0%,100% { transform: rotate(0); } 50% { transform: rotate(45deg); } }

    /* Names */
    .names {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: center;
      gap: clamp(0.35em, 2.2vw, 0.6em);
      line-height: 1.02;
      color: var(--ink);
    }
    .nm-s { font-size: clamp(0.96rem, 3.1vw, 1.73rem); font-weight: 300; letter-spacing: .01em; color: #33312c; }
    .nm-a { font-size: clamp(1.37rem, 4.55vw, 2.46rem);    font-weight: 500; color: #211f1b; }
    .nm-u { font-size: clamp(2.18rem, 8.2vw, 3.82rem);    font-weight: 700; letter-spacing: -.012em; }

    .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.3,1) forwards; }
    @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

    /* ---------- Nav ---------- */
    nav {
      padding: clamp(1.25rem, 4vw, 2rem) 1rem;
      padding-bottom: calc(clamp(1.25rem, 4vw, 2rem) + env(safe-area-inset-bottom, 0px));
    }
    .links {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: clamp(0.9rem, 3.5vw, 2.2rem);
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      color: var(--link);
      font-size: clamp(0.75rem, 2.35vw, 0.86rem);
      font-weight: 400;
      letter-spacing: .01em;
      border-bottom: 2px solid transparent;
      padding-bottom: 3px;
      transition: color .22s ease, border-color .22s ease;
    }
    .links a .who { font-weight: 500; color: var(--who); transition: color .22s ease; }
    .bul svg { width: 14px; height: 14px; display: block; transform-box: fill-box; transform-origin: center; transition: transform .32s cubic-bezier(.2,.7,.3,1); }

    .links a:hover, .links a:focus-visible { color: var(--ink); border-color: var(--ink); outline: none; }
    .links a:hover .who, .links a:focus-visible .who { color: var(--ink); }
    .l-c:hover .bul svg, .l-c:focus-visible .bul svg { transform: scale(1.22); }   /* circle  */
    .l-t:hover .bul svg, .l-t:focus-visible .bul svg { transform: rotate(180deg); } /* triangle */
    .l-s:hover .bul svg, .l-s:focus-visible .bul svg { transform: rotate(45deg); }  /* square   */

    @media (max-width: 640px) {
      .links { flex-direction: column; gap: 1rem; }
      .links a { justify-content: center; }
      .corner { top: max(2.9rem, calc(env(safe-area-inset-top, 0px) + 0.7rem)); }
    }

    @media (prefers-reduced-motion: reduce) {
      .ein, .rise { opacity: 1 !important; animation: none !important; transform: none !important; }
      .spin-c, .spin-t, .spin-s { animation: none !important; transform: none !important; }
      .bul svg, .links a, .links a .who { transition: none !important; }
    }
  </style>
</head>
<body>
  <p class="corner">Born as Aries and being INFJ.</p>
  <main>
    <div class="emblem" aria-hidden="true">
      <span class="ein" style="animation-delay:.05s">
        <svg class="shp spin-c" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="16" fill="#1a1a1a"/>
        </svg>
      </span>
      <span class="ein" style="animation-delay:.17s">
        <svg class="shp spin-t" viewBox="0 0 40 40">
          <polygon points="20,1.5 36.5,29.5 3.5,29.5" fill="#1a1a1a"/>
        </svg>
      </span>
      <span class="ein" style="animation-delay:.29s">
        <svg class="shp spin-s" viewBox="0 0 40 40">
          <rect x="7" y="7" width="26" height="26" fill="#1a1a1a"/>
        </svg>
      </span>
    </div>

    <h1 class="names">
      <span class="rise nm-s" style="animation-delay:.42s">Shangshang&nbsp;Wang</span>
      <span class="rise nm-a" style="animation-delay:.52s">Ashton</span>
      <span class="rise nm-u" style="animation-delay:.62s">&ldquo;Upup&rdquo;</span>
    </h1>
  </main>

  <nav class="rise" style="animation-delay:.78s" aria-label="Three ways of living">
    <ul class="links">
      <li><a class="l-c" href="https://shangshangwang.notion.site/academic">
        <span class="bul"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#1a1a1a"/></svg></span>
        Living by Research, as <span class="who">Shangshang</span></a></li>
      <li><a class="l-t" href="https://shangshangwang.notion.site/personal-collection">
        <span class="bul"><svg viewBox="0 0 24 24"><polygon points="12,3 21,20 3,20" fill="#1a1a1a"/></svg></span>
        Living by Seeing, as <span class="who">Ashton</span></a></li>
      <li><a class="l-s" href="https://shangshangwang.notion.site/personal-creation">
        <span class="bul"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" fill="#1a1a1a"/></svg></span>
        Living by Living, as <span class="who">Upup</span></a></li>
    </ul>
  </nav>
</body>
</html>
