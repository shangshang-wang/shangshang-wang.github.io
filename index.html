<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Shangshang Wang</title>
  <meta name="description" content="Shangshang Wang — living by research (Shangshang), by seeing (Ashton), and by living (Upup)." />
  <link rel="icon" type="image/png" href="assets/avatar.png" />

  <!-- Social preview (crawlers don't run the script below, so keep meta here) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Shangshang Wang" />
  <meta property="og:description" content="Living by Research, by Seeing, by Living." />
  <meta property="og:url" content="https://shangshang-wang.github.io/" />
  <meta property="og:image" content="https://shangshang-wang.github.io/assets/avatar.png" />
  <meta name="twitter:card" content="summary" />

  <!-- No JavaScript? Fall back to one version. -->
  <noscript><meta http-equiv="refresh" content="0; url=v1.html" /></noscript>

  <style>
    html, body { margin: 0; height: 100%; background: #f4f1ea; }
  </style>
</head>
<body>
  <script>
    /* Cycle through the versions in order, one per visit: v1 -> v2 -> v3 -> v1 ...
       Position is remembered in localStorage. Note: a static site has no server,
       so the counter lives per-browser (each visitor advances on their own visits).
       The chosen version is loaded inline so the address bar stays at "/";
       if that isn't possible (JS fetch blocked, file://, etc.) we redirect. */
    (function () {
      var versions = ["v1.html", "v2.html", "v3.html"];
      var KEY = "ssw-version-step";
      var i = 0;

      try {
        var saved = parseInt(localStorage.getItem(KEY), 10);
        if (!isNaN(saved)) i = ((saved % versions.length) + versions.length) % versions.length;
        localStorage.setItem(KEY, (i + 1) % versions.length);
      } catch (e) { /* localStorage unavailable: just start at v1 */ }

      var pick = versions[i];

      try {
        fetch(pick)
          .then(function (res) {
            if (!res.ok) throw new Error("fetch failed");
            return res.text();
          })
          .then(function (html) {
            document.open();
            document.write(html);
            document.close();
          })
          .catch(function () { window.location.replace(pick); });
      } catch (e) {
        window.location.replace(pick);
      }
    })();
  </script>
</body>
</html>
